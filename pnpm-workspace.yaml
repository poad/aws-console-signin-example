packages:
  - ./**
  - '!**/.next'
  - '!**/cdk.out'

allowBuilds:
  esbuild: false
  sharp: false
  unrs-resolver: false

minimumReleaseAge: 10080 # 7 days in minutes

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - unrs-resolver

overrides:
  '@eslint/js': '>=10'
  '@types/node': ^24
  brace-expansion@<1.1.13: '>=1.1.13'
  brace-expansion@>=2.0.0 <2.0.3: '>=2.0.3'
  chokidar: '>=5'
  defu@<=6.1.4: '>=6.1.5'
  eslint: '>=10'
  eslint-import-resolver-typescript: '>=4'
  fast-uri@<=3.1.1: ^3.1.2
  fast-xml-builder@<=1.1.6: ^1.1.7
  fast-xml-parser@<5.7.0: '>=5.7.0'
  flatted@<=3.4.1: '>=3.4.2'
  h3@<1.15.6: '>=1.15.6'
  h3@<1.15.9: '>=1.15.9'
  h3@<=1.15.4: '>=1.15.5'
  h3@<=1.15.8: '>=1.15.9'
  js-cookie@<=3.0.5: ^3.0.6
  lodash@<=4.17.23: '>=4.18.0'
  lodash@>=4.0.0 <=4.17.23: '>=4.18.0'
  markdown-it@>=13.0.0 <14.1.1: '>=14.1.1'
  next@>=16.0.0 <16.2.6: ^16.2.6
  postcss@<8.5.10: '>=8.5.10'
  semver: '>=7'
  serialize-javascript@<=7.0.2: '>=7.0.3'
  uuid@<14.0.0: '>=14.0.0'
  vite@<=6.4.1: '>=6.4.2'
  vite@>=6.0.0 <=6.4.1: '>=6.4.2'
  vite@>=7.0.0 <=7.3.1: '>=7.3.2'
  vite@>=7.1.0 <=7.3.1: '>=7.3.2'
  vite@>=8.0.0 <=8.0.4: '>=8.0.5'

trustPolicy: no-downgrade
