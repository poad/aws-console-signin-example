packages:
  - ./**
  - '!**/.next'
  - '!**/cdk.out'

allowBuilds:
  esbuild: false
  sharp: false
  unrs-resolver: false

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - postcss@8.5.10

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - unrs-resolver

overrides:
  chokidar: '>=5'
  eslint-import-resolver-typescript: '>=4'
  postcss@<8.5.10: ^8.5.10
  semver: '>=7'

trustPolicy: no-downgrade
